<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
'use strict';

const WORKER='https://candle-practice-1min.kim80091.workers.dev'; // TODO: 실제 배포 후 주소 확인/교체
const FEE=.0023, VP=8, VIS=90; // 키움증권 실수수료: 매수 0.015% + 매도 0.215% = 왕복 0.230%
let stockList=[], curStock=null;
let shuffleBag=[]; // "다른 종목" 뽑을 때 다 한 번씩 나올 때까지 중복 안 되게 뽑는 통

// 통이 비면 전체 인덱스를 다시 채우고 섞음(Fisher-Yates), 하나 뽑아서 반환
function drawFromBag(){
  if(!shuffleBag.length){
    shuffleBag=stockList.map((_,i)=>i);
    for(let i=shuffleBag.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [shuffleBag[i],shuffleBag[j]]=[shuffleBag[j],shuffleBag[i]];
    }
  }
  return shuffleBag.pop();
}
let candles=[], timer=null, pos=null, tPnl=0, trades=[];
let intSec=1, elapsed=0, capital=100000000;
let wins=0, losses=0, holdSum=0;
let tradeHistory=[], aiCount=0, lastTradeRecord=null;

// ── 지표 ─────────────────────────────────────────────────────
const TAIL_VISIBLE=20; // 전일 마지막 몇 분을 실제 캔들로 화면에 보여줄지
let histCandles=[]; // 전일 시드 중 화면에 안 보이는 부분(계산 전용, TAIL_VISIBLE보다 이전 구간)

// idx>=0: 오늘 candles 배열, idx<0: 전일 시드(histCandles)에서 역산해서 가져옴
function closeAt(idx){
  if(idx>=0){
    return candles[idx]?candles[idx].close:undefined;
  }
  const hIdx=histCandles.length+idx; // idx=-1 → 마지막 시드 종가
  return hIdx>=0?histCandles[hIdx].close:undefined;
}

function ma(p,idx){
  let s=0;
  for(let i=idx-p+1;i<=idx;i++){
    const c=closeAt(i);
    if(c===undefined)return null;
    s+=c;
  }
  return s/p;
}
// 볼린저밴드 (기간 20, 표준편차 배수 2) — 상단/하단만 사용, 중심선(SMA20)은 화면에 표시 안 함
const BB_PERIOD=20, BB_MULT=2;
function bbStats(idx){
  let sum=0;
  for(let i=idx-BB_PERIOD+1;i<=idx;i++){
    const c=closeAt(i);
    if(c===undefined)return null;
    sum+=c;
  }
  const mid=sum/BB_PERIOD;
  let sq=0;
  for(let i=idx-BB_PERIOD+1;i<=idx;i++){
    const c=closeAt(i);
    sq+=(c-mid)*(c-mid);
  }
  return {mid,sd:Math.sqrt(sq/BB_PERIOD)};
}
function bbUpper(idx){const b=bbStats(idx);return b?b.mid+BB_MULT*b.sd:null;}
function bbLower(idx){const b=bbStats(idx);return b?b.mid-BB_MULT*b.sd:null;}
// MA10과 캔들위치: 종가-MA10 차이값 (막대 높이). 종가>=MA10 이면 빨강, 종가<MA10 이면 파랑
function maPosDiff(idx){
  const m=ma(10,idx);
  const c=closeAt(idx);
  if(m===null||c===undefined)return null;
  return c-m;
}
// 볼린저밴드 이격: 상한선 근접=+10, 하한선 근접=-10, 중심선(SMA20)=0
function bbDeviation(idx){
  const b=bbStats(idx);
  if(!b)return null;
  const upper=b.mid+BB_MULT*b.sd,lower=b.mid-BB_MULT*b.sd,range=upper-lower;
  if(range<=0)return 0;
  const price=closeAt(idx);
  if(price===undefined)return null;
  const pctB=(price-lower)/range; // 0=하한선, 0.5=중심선, 1=상한선 (밴드 밖이면 범위 벗어난 값도 가능)
  return (pctB-0.5)*20;
}

// OBV (On Balance Volume) — 당일 세션(0번 인덱스=장 시작) 기준 누적
function obvSeries(){
  const arr=[];
  let val=0;
  for(let i=0;i<candles.length;i++){
    if(i===0){val=candles[i].volume;}
    else if(candles[i].close>candles[i-1].close){val+=candles[i].volume;}
    else if(candles[i].close<candles[i-1].close){val-=candles[i].volume;}
    arr.push(val);
  }
  return arr;
}
// OBV Signal — 단순이동평균(SMA), 기간 10
function obvSignalMA(arr,idx,p){
  if(idx+1<p)return null;
  let s=0;for(let i=idx-p+1;i<=idx;i++)s+=arr[i];
  return s/p;
}
// OBV가 Signal(10)을 상향/하향 돌파하는 지점 (골든/데드크로스)
function obvCross(arr,idx){
  const cur=obvSignalMA(arr,idx,10),prev=obvSignalMA(arr,idx-1,10);
  if(cur===null||prev===null)return 0;
  const curV=arr[idx],prevV=arr[idx-1];
  if(prevV<prev&&curV>=cur)return 1;   // 골든크로스
  if(prevV>prev&&curV<=cur)return -1;  // 데드크로스
  return 0;
}
// 당일 세션(배열 0번 인덱스=장 시작) 기준 최고거래량
function hvol(idx){
  const start=window._todayStartIdx||0;
  let h=0;
  for(let i=start;i<=idx;i++)if(candles[i]&&candles[i].volume>h)h=candles[i].volume;
  return h;
}
// 최고거래량90%,20억 신호
// HighestVolume = 당일 장 시작 이후 최고 거래량
// Ratio = (V / HighestVolume) * 100, Value = V * C
// Ratio > 90 and Value >= 20억 일 때만 신호
function volSignal(idx){
  const hv=hvol(idx);
  if(!hv)return false;
  const ratio=candles[idx].volume/hv*100;
  const value=candles[idx].volume*candles[idx].close;
  return(ratio>90&&value>=2000000000);
}

// MA40 방향: 현재 MA40 > 직전 MA40 → 1(상승), < → -1(하락), = → 0(횡보)
function ma40Dir(idx){
  const cur=ma(40,idx);
  const prev=ma(40,idx-1);
  if(cur===null||prev===null)return 0;
  if(cur>prev)return 1;
  if(cur<prev)return -1;
  return 0;
}

// MA40 크로스 신호
// CrossUp(C,M): 직전 종가 < MA40 이고 현재 종가 >= MA40 → 골든크로스 1 (주황)
// CrossDown(C,M): 직전 종가 > MA40 이고 현재 종가 <= MA40 → 데드크로스 -1 (에메랄드)
function ma40Cross(idx){
  const curC=closeAt(idx),prevC=closeAt(idx-1);
  if(curC===undefined||prevC===undefined)return 0;
  const curM=ma(40,idx);
  const prevM=ma(40,idx-1);
  if(!curM||!prevM)return 0;
  if(prevC<prevM&&curC>=curM)return 1;   // CrossUp → 골든크로스
  if(prevC>prevM&&curC<=curM)return -1;  // CrossDown → 데드크로스
  return 0;
}

// ── 스냅샷 (풍부한 지표) ────────────────────────────────────
function snapshot(idx){
  if(idx<0||idx>=candles.length)return null;
  const c=candles[idx];
  const m5=ma(5,idx),m20=ma(10,idx),m80=ma(40,idx);

  let upStreak=0,downStreak=0;
  for(let i=idx-1;i>=Math.max(0,idx-5);i--){
    if(candles[i].close>=candles[i].open)upStreak++;else break;
  }
  for(let i=idx-1;i>=Math.max(0,idx-5);i--){
    if(candles[i].close<candles[i].open)downStreak++;else break;
  }

  const body=Math.abs(c.close-c.open);
  const upperWick=c.high-Math.max(c.close,c.open);
  const lowerWick=Math.min(c.close,c.open)-c.low;
  const range=c.high-c.low||1;
  let candleShape='보통';
  if(body/range>0.7)candleShape=c.close>=c.open?'장대양봉':'장대음봉';
  else if(upperWick/range>0.5)candleShape='윗꼬리 긴 봉';
  else if(lowerWick/range>0.5)candleShape='아랫꼬리 긴 봉(망치형)';
  else if(body/range<0.2)candleShape='도지(십자봉)';

  const gapMa20=m20?((c.close-m20)/m20*100).toFixed(1):null;
  const gapMa80=m80?((c.close-m80)/m80*100).toFixed(1):null;
  const maConverging=m5&&m20&&m80?Math.abs(m5-m80)/m80*100<3:false;

  let prev20High=-Infinity;
  for(let i=Math.max(0,idx-20);i<idx;i++)if(candles[i].high>prev20High)prev20High=candles[i].high;
  const breakout=prev20High>0&&c.close>prev20High;

  let avgVol=0,volCount=0;
  for(let i=Math.max(0,idx-20);i<idx;i++){avgVol+=candles[i].volume;volCount++;}
  avgVol=volCount>0?avgVol/volCount:c.volume;
  const volRatio=(c.volume/avgVol*100).toFixed(0);

  return{
    price:c.close,ma5:m5,ma20:m20,ma80:m80,
    gapMa20,gapMa80,maConverging,
    volSignal:volSignal(idx),volRatio,
    isUp:c.close>=c.open,candleShape,
    upStreak,downStreak,breakout
  };
}
function maStatus(s){
  if(!s||!s.ma5||!s.ma20||!s.ma80)return'데이터 부족';
  if(s.ma5>s.ma20&&s.ma20>s.ma80)return'정배열(상승)';
  if(s.ma5<s.ma20&&s.ma20<s.ma80)return'역배열(하락)';
  return'혼조';
}

// ── 차트 플러그인 ─────────────────────────────────────────────
const uC='#E24B4A',dC='#378ADD',uV='rgba(226,75,74,.5)',dV='rgba(55,138,221,.5)';
const bC='#0F6E56',sC='#993556';
const pC='#D93025',lC='#2F6FD3'; // 손익 표시 전용: 수익=빨강, 손실=파랑

Chart.register({id:'ann',afterDraw(chart){
  const o=chart.options.plugins&&chart.options.plugins.ann;
  if(!o||!o.list)return;
  const{ctx,scales,chartArea}=chart;
  const x=scales.x,y=scales.y;
  ctx.save();
  for(const a of o.list){
    if(a.t==='box'){
      ctx.fillStyle=a.bg;
      const x1=x.getPixelForValue(a.x1),x2=x.getPixelForValue(a.x2);
      const y1=y.getPixelForValue(a.y2),y2=y.getPixelForValue(a.y1);
      ctx.fillRect(x1,y1,Math.max(1,x2-x1),Math.max(1,y2-y1));
    }else if(a.t==='wick'){
      ctx.strokeStyle=a.cl;ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(x.getPixelForValue(a.xi),y.getPixelForValue(a.hi));
      ctx.lineTo(x.getPixelForValue(a.xi),y.getPixelForValue(a.lo));
      ctx.stroke();
    }else if(a.t==='dot'){
      ctx.fillStyle='#BA7517';ctx.strokeStyle='#633806';ctx.lineWidth=1;
      const dpx=x.getPixelForValue(a.xi),dpy=y.getPixelForValue(a.yi)-10;
      ctx.beginPath();
      ctx.arc(dpx,dpy,4,0,Math.PI*2);
      ctx.fill();ctx.stroke();
    }else if(a.t==='hline'){
      ctx.strokeStyle=a.cl;ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(x.getPixelForValue(a.x1),y.getPixelForValue(a.yv));
      ctx.lineTo(x.getPixelForValue(a.x2),y.getPixelForValue(a.yv));
      ctx.stroke();
    }else if(a.t==='vline'){
      ctx.strokeStyle='rgba(120,120,120,.55)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
      const px=x.getPixelForValue(a.xi);
      ctx.beginPath();
      ctx.moveTo(px,chartArea.top);ctx.lineTo(px,chartArea.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
    }else if(a.t==='arrow'){
      const px=x.getPixelForValue(a.xi),py=y.getPixelForValue(a.yi),sz=a.half?8*.65:8;
      const gap=16; // 캔들과 화살표 사이 최소 여백(고정 픽셀) — 캔들을 가리지 않도록
      ctx.lineJoin='round';
      if(a.up){
        const tipY=py+gap,by=tipY+sz*1.8;
        ctx.beginPath();ctx.moveTo(px,tipY);ctx.lineTo(px-sz,by);ctx.lineTo(px+sz,by);ctx.closePath();
        ctx.fillStyle='#fff';ctx.fill();
        ctx.lineWidth=3;ctx.strokeStyle='#fff';ctx.stroke();
        ctx.fillStyle=a.cl;ctx.fill();
        ctx.lineWidth=1.5;ctx.strokeStyle=a.cl;ctx.stroke();
        ctx.beginPath();ctx.moveTo(px,by);ctx.lineTo(px,by+sz);ctx.lineWidth=3;ctx.strokeStyle='#fff';ctx.stroke();
        ctx.lineWidth=1.5;ctx.strokeStyle=a.cl;ctx.stroke();
      }else{
        const tipY=py-gap,by=tipY-sz*1.8;
        ctx.beginPath();ctx.moveTo(px,tipY);ctx.lineTo(px-sz,by);ctx.lineTo(px+sz,by);ctx.closePath();
        ctx.fillStyle='#fff';ctx.fill();
        ctx.lineWidth=3;ctx.strokeStyle='#fff';ctx.stroke();
        ctx.fillStyle=a.cl;ctx.fill();
        ctx.lineWidth=1.5;ctx.strokeStyle=a.cl;ctx.stroke();
        ctx.beginPath();ctx.moveTo(px,by);ctx.lineTo(px,by-sz);ctx.lineWidth=3;ctx.strokeStyle='#fff';ctx.stroke();
        ctx.lineWidth=1.5;ctx.strokeStyle=a.cl;ctx.stroke();
      }
    }else if(a.t==='tinyarrow'){
      // 작은 보조지표 패널용 소형 화살표 (골든/데드크로스 표시 등) — 선에서 살짝 떨어진 위치에 표시
      const px=x.getPixelForValue(a.xi),py=y.getPixelForValue(a.yi);
      const gap=5,shaftLen=5,headLen=3,headW=3;
      ctx.strokeStyle=a.cl;ctx.lineWidth=1.6;ctx.lineCap='round';ctx.lineJoin='round';
      if(a.up){
        // 선 아래쪽에서 위쪽(선 방향)을 향하는 화살표
        const tipY=py+gap,tailY=tipY+shaftLen;
        ctx.beginPath();ctx.moveTo(px,tailY);ctx.lineTo(px,tipY);ctx.stroke();
        ctx.beginPath();ctx.moveTo(px-headW,tipY+headLen);ctx.lineTo(px,tipY);ctx.lineTo(px+headW,tipY+headLen);ctx.stroke();
      }else{
        // 선 위쪽에서 아래쪽(선 방향)을 향하는 화살표
        const tipY=py-gap,tailY=tipY-shaftLen;
        ctx.beginPath();ctx.moveTo(px,tailY);ctx.lineTo(px,tipY);ctx.stroke();
        ctx.beginPath();ctx.moveTo(px-headW,tipY-headLen);ctx.lineTo(px,tipY);ctx.lineTo(px+headW,tipY-headLen);ctx.stroke();
      }
    }
  }
  ctx.restore();
}});

// ── 뷰 계산 ──────────────────────────────────────────────────
function vs(){return Math.max(0,candles.length-VIS);}
function padOffset(){return Math.max(0,VIS-(candles.length-vs()));}
function mkLbl(){return Array.from({length:VIS+VP},(_,i)=>i);}
function vdata(fn){
  const s=vs(),a=[];
  for(let i=s;i<candles.length;i++)a.push(fn(i));
  while(a.length<VIS)a.unshift(null);
  for(let i=0;i<VP;i++)a.push(null);
  return a;
}
function buildPA(){
  const list=[],s=vs(),pad=padOffset();
  for(let i=s;i<candles.length;i++){
    const c=candles[i],li=pad+(i-s),up=c.close>=c.open;
    list.push({t:'box',x1:li-.35,x2:li+.35,y1:Math.min(c.open,c.close),y2:Math.max(c.open,c.close),bg:up?uC:dC});
    list.push({t:'wick',xi:li,hi:c.high,lo:c.low,cl:up?uC:dC});
    if(i>=(window._todayStartIdx||0)&&volSignal(i))list.push({t:'dot',xi:li,yi:c.high});
  }
  trades.forEach(t=>{
    if(t.i<s||t.i>=candles.length)return;
    const c=candles[t.i],li=pad+(t.i-s);
    list.push({t:'arrow',xi:li,yi:t.buy?c.low:c.high,cl:t.buy?bC:sC,up:t.buy,half:t.half});
  });
  // 날짜 분기선 (전일 프리픽스 ↔ 오늘 첫 봉 경계)
  if(window._todayStartIdx!==undefined&&window._todayStartIdx>=s&&window._todayStartIdx<candles.length){
    const li=pad+(window._todayStartIdx-s);
    list.push({t:'vline',xi:li-.5});
  }
  return list;
}

function refresh(){
  if(!candles.length)return;
  const s=vs(),lbls=mkLbl();
  PC.data.labels=lbls;
  PC.data.datasets[0].data=vdata(i=>ma(10,i));
  PC.data.datasets[1].data=vdata(i=>ma(40,i));
  PC.data.datasets[2].data=vdata(i=>bbUpper(i));
  PC.data.datasets[3].data=vdata(i=>bbLower(i));
  PC.options.plugins.ann.list=buildPA();
  let mn=Infinity,mx=-Infinity;
  for(let i=s;i<candles.length;i++){
    if(candles[i].low<mn)mn=candles[i].low;
    if(candles[i].high>mx)mx=candles[i].high;
    if(showBB){
      const bu=bbUpper(i),bl=bbLower(i);
      if(bu!==null&&bu>mx)mx=bu;
      if(bl!==null&&bl<mn)mn=bl;
    }
  }
  const pd=(mx-mn)*.08;
  PC.options.scales.y.min=mn-pd;PC.options.scales.y.max=mx+pd;

  // MA40 추세 방향 차트
  MT.data.labels=lbls;
  const mtData=vdata(i=>ma40Dir(i));
  MT.data.datasets[0].data=mtData;
  MT.data.datasets[0].backgroundColor=mtData.map(v=>
    v===1?'rgba(226,75,74,0.7)':v===-1?'rgba(55,138,221,0.7)':'rgba(180,180,180,0.4)'
  );

  // MA40 현재값 레이블
  const lastDir=ma40Dir(candles.length-1);
  const trendEl=document.getElementById('vMaTrend');
  if(lastDir===1){trendEl.textContent='▲ 상승';trendEl.style.color='#E24B4A';}
  else if(lastDir===-1){trendEl.textContent='▼ 하락';trendEl.style.color='#378ADD';}
  else{trendEl.textContent='— 횡보';trendEl.style.color='#888';}

  // MA40 골든/데드크로스 차트
  MC.data.labels=lbls;
  const mcData=vdata(i=>ma40Cross(i));
  MC.data.datasets[0].data=mcData;

    v===1?'rgba(245,166,35,0.9)':v===-1?'rgba(46,205,167,0.9)':'rgba(0,0,0,0)'
  );

  // MA40 크로스 현재값 레이블
  const lastCross=ma40Cross(candles.length-1);
  const crossEl=document.getElementById('vMaCross');
  if(lastCross===1){crossEl.textContent='▲ 골든크로스';crossEl.style.color='#F5A623';}
  else if(lastCross===-1){crossEl.textContent='▼ 데드크로스';crossEl.style.color='#2ECDA7';}
  else{crossEl.textContent='-';crossEl.style.color='#555';}

  // OBV (On Balance Volume) + Signal(10, 단순이동평균) 차트
  const obvArr=obvSeries();
  OC.data.labels=lbls;
  OC.data.datasets[0].data=vdata(i=>obvArr[i]);
  OC.data.datasets[1].data=vdata(i=>obvSignalMA(obvArr,i,10));

  // OBV 골든/데드크로스 지점에 작은 화살표 표시
  const obvPad=padOffset();
  const obvArrows=[];

    const cr=obvCross(obvArr,i);
    if(cr!==0){
      obvArrows.push({t:'tinyarrow',xi:obvPad+(i-s),yi:obvArr[i],
        cl:cr===1?'#D93025':'#2F6FD3',up:cr===1});
    }
  }
  OC.options.plugins.ann.list=obvArrows;

  // OBV 현재값 레이블 (숫자로 표시, 색상은 Signal 대비 위/아래로 구분)

  // MA10과 캔들위치 차트 (종가>=MA10 빨강, 종가<MA10 파랑)
  MPC.data.labels=lbls;
  const mpData=vdata(i=>maPosDiff(i));

    bbDevEl.textContent=lastBbDev.toFixed(1);
    bbDevEl.style.color=lastBbDev>0?pC:lastBbDev<0?lC:'#1a1a1a';
  }

  // 거래대금 차트 (억원 단위)
  VLC.data.labels=lbls;
  VLC.data.datasets[0].data=vdata(i=>candles[i].volume*candles[i].close);

  // 거래대금 현재값 레이블
  const lastValue=candles[candles.length-1].volume*candles[candles.length-1].close;
  document.getElementById('vValue').textContent=fmtEok(lastValue)+'억';

  PC.update('none');MT.update('none');MC.update('none');OC.update('none');VLC.update('none');BDC.update('none');MPC.update('none');
  updateUI();
}

// ── UI 갱신 ──────────────────────────────────────────────────
function fp(v){return Math.round(v).toLocaleString('ko-KR');}
function updateUI(){
  if(!candles.length)return;
  const last=candles[candles.length-1];
  const lastChg=(last.close-last.open)/last.open*100;
  const lcEl=document.getElementById('vLastChg');
  lcEl.textContent=(lastChg>0?'+':'')+lastChg.toFixed(2)+'%';
  lcEl.style.color=lastChg>0?pC:lastChg<0?lC:'#1a1a1a';
  if(pos){
    const net=(last.close-pos.p)/pos.p*100-FEE*100;
    const el=document.getElementById('vPnl');
    el.textContent=net.toFixed(1)+'%';el.style.color=net>=0?pC:lC;
    const pctTxt=pos.frac<0.999?' ('+Math.round(pos.frac*100)+'% 보유)':'';
    document.getElementById('vHold').textContent=(elapsed-pos.d)+'분째'+pctTxt;
  }else{
    const el=document.getElementById('vPnl');el.textContent='-';el.style.color='#1a1a1a';
    document.getElementById('vHold').textContent='-';
  }
  let asset=capital*(1+tPnl/100);
  if(pos){const net=(last.close-pos.p)/pos.p*100-FEE*100;asset=capital*(1+(tPnl+net*pos.frac)/100);}
  const ael=document.getElementById('vAsset');

  const anel=document.getElementById('vAnnual');

    anel.textContent=tPnl.toFixed(1)+'%';
    anel.style.color=tPnl>0?pC:(tPnl<0?lC:'#1a1a1a');
  }else{anel.textContent='-';anel.style.color='#1a1a1a';}
  const tot=wins+losses;
  document.getElementById('vTradeCount').textContent=tot+'회';

  if(tot>0){const wr=wins/tot*100;wrel.textContent=wr.toFixed(1)+'% ('+tot+'회)';wrel.style.color=wr>=50?pC:lC;}
  else{wrel.textContent='0% (0회)';wrel.style.color='#1a1a1a';}
  document.getElementById('vAvgHold').textContent=tot>0?(holdSum/tot).toFixed(1)+'분':'-';
  document.getElementById('dayLabel').textContent='경과: '+elapsed+'분째';

// ── 매매 ─────────────────────────────────────────────────────
function log(t){
  const el=document.getElementById('tlog'),d=document.createElement('div');
  d.textContent=t;el.prepend(d);
}
function doBuy(buyFrac){
  // buyFrac: 1 => 잔여 전부 매수, 0.5 => 1/2분할매수 (1번째 클릭 50%, 2번째 클릭에 잔여 전부)
  const last=candles[candles.length-1],idx=candles.length-1;
  if(pos&&pos.frac>=0.999){log('이미 전량 매수 상태입니다.');return;}
  if(pos&&buyFrac>=1){log('분할 매수 진행 중입니다. 1/2분할매수를 이용하세요.');return;}

  // 포지션이 없으면 이번이 1번째 클릭(50%), 이미 있으면 2번째 클릭(잔여 전부)
  const addFrac=pos?(1-pos.frac):(buyFrac>=1?1:0.5);
  if(addFrac<=0)return;

  if(!pos){
    pos={p:last.close,frac:addFrac,i:idx,d:elapsed,snap:snapshot(idx),maxPct:0,minPct:0,sellContribSum:0,sellAmtSum:0,halfSellUsed:false};
  }else{
    pos.p=(pos.p*pos.frac+last.close*addFrac)/(pos.frac+addFrac);
    pos.frac+=addFrac;
  }
  trades.push({i:idx,buy:true,half:buyFrac<1});
  const pct=Math.round(pos.frac*100);
  log((buyFrac<1?'1/2분할매수':'매수')+' @ '+fp(last.close)+' ('+elapsed+'분째) — 보유비중 '+pct+'%');
  refresh();
}
function doSell(sellFrac){
  // sellFrac: 1 => 보유 전량 매도(청산), 0.5 => 1/2분할매도 (1번째 클릭 보유량의 50%, 2번째 클릭에 잔여 전부)
  if(!pos){log('보유 중인 포지션이 없습니다.');return;}
  const last=candles[candles.length-1],idx=candles.length-1;
  const gross=(last.close-pos.p)/pos.p*100;
  const net=gross-FEE*100;

  let sellAmt;
  if(sellFrac>=1){
    sellAmt=pos.frac; // 전체 매도: 잔여 전부 청산
  }else if(!pos.halfSellUsed){
    sellAmt=pos.frac*0.5; // 1번째 분할매도: 현재 보유량의 절반
    pos.halfSellUsed=true;
  }else{
    sellAmt=pos.frac; // 2번째 분할매도: 잔여 전부 청산
  }

  tPnl+=net*sellAmt;
  pos.sellContribSum+=net*sellAmt;
  pos.sellAmtSum+=sellAmt;
  pos.frac-=sellAmt;

  trades.push({i:idx,buy:false,half:sellFrac<1});
  const remainPct=Math.round(pos.frac*100);
  const closing=pos.frac<=0.001;
  const holdTxt=closing?' | 보유 '+(elapsed-pos.d)+'분':'';
  log((sellFrac<1?'1/2분할매도':'매도')+' @ '+fp(last.close)+holdTxt+' | '+net.toFixed(1)+'% (비중 '+Math.round(sellAmt*100)+'%'+(closing?'':', 잔여 '+remainPct+'%')+')');

  if(closing){
    // 포지션 완전 청산 → 거래 1건으로 기록 (여러 번의 분할매도는 비중 가중평균으로 집계)
    const avgNet=pos.sellAmtSum>0?pos.sellContribSum/pos.sellAmtSum:net;
    const h=elapsed-pos.d;holdSum+=h;
    avgNet>0?wins++:losses++;
    const record={
      no:tradeHistory.length+1,
      buyPrice:pos.p,sellPrice:last.close,
      buyDay:pos.d,sellDay:elapsed,holdDays:h,
      netPct:avgNet,grossPct:avgNet+FEE*100,
      maxPct:pos.maxPct,minPct:pos.minPct,
      win:avgNet>0,
      buySnap:pos.snap,sellSnap:snapshot(idx)
    };
    tradeHistory.push(record);
    lastTradeRecord=record;
    pos=null;refresh();
    document.getElementById('aiStatus').textContent='분석 대기 중 — 버튼을 눌러 요청하세요';
  }else{
    refresh();
  }
}

// ── tick ─────────────────────────────────────────────────────
function tick(){
  if(!window._realAllCandles || window._realNextIdx >= window._realAllCandles.length){
    stopT();
    log('데이터 종료 — 15:30 장 마감까지 재생 완료');
    return;
  }
  candles.push(window._realAllCandles[window._realNextIdx]);
  window._realNextIdx++;
  elapsed++;
  if(pos){
    const cur=(candles[candles.length-1].close-pos.p)/pos.p*100;
    if(cur>pos.maxPct)pos.maxPct=cur;
    if(cur<pos.minPct)pos.minPct=cur;
  }
  if(candles.length>600){
    candles.shift();
    trades.forEach(t=>{t.i--;});
    if(pos)pos.i--;
    trades=trades.filter(t=>t.i>=0);
  }
  refresh();
}

}

async function loadReal(code, date){
  showOv(code+' ('+date+') 불러오는 중...');
  stopT();
  try{
    const res=await fetch(WORKER+'/ohlcv1m?code='+code+'&date='+date);
    const js=await res.json();
    if(js.error)throw new Error(js.error);
    if(!js.candles||js.candles.length<10)throw new Error('데이터 부족');

    const todayCandles=js.candles.map(d=>({time:d.time,open:d.open,high:d.high,low:d.low,close:d.close,volume:d.volume}));
    const total=todayCandles.length;

    // 전일 마지막 분봉 시드 데이터 조회 — 최근 TAIL_VISIBLE분은 실제 캔들로 화면에 보여주고,
    // 그 이전 분(최대 TAIL_LEN분까지)은 화면엔 안 보이되 MA10/MA40/볼린저밴드 계산에만 사용
    let visiblePrefix=[];
    histCandles=[];
    try{
      const tres=await fetch(WORKER+'/tail1m?code='+code+'&date='+date);
      const tjs=await tres.json();
      if(tjs.tail&&tjs.tail.length){
        const tail=tjs.tail; // 오래된→최신 순
        const visCount=Math.min(TAIL_VISIBLE,tail.length);
        visiblePrefix=tail.slice(tail.length-visCount);
        histCandles=tail.slice(0,tail.length-visCount);
      }
    }catch(e){/* 시드 데이터 없어도 무방, 기존 방식대로 동작 */}

    const allCandles=visiblePrefix.map(d=>{
      // 예전 형식(종가만 저장된 데이터)이면 시가=고가=저가=종가로 대체해 단순화된 캔들로 표시
      const hasOHLC=d.open!==undefined&&d.high!==undefined&&d.low!==undefined;
      return hasOHLC
        ? {time:d.time,open:d.open,high:d.high,low:d.low,close:d.close,volume:d.volume||0}
        : {time:d.time,open:d.close,high:d.close,low:d.close,close:d.close,volume:d.volume||0};
    }).concat(todayCandles);
    const todayStartIdx=visiblePrefix.length; // 오늘 첫 봉의 인덱스 — 날짜분기선 위치

    // 항상 오늘 첫 봉부터 시작 — 전일 프리픽스는 전부 미리 보여주고, 오늘 첫 봉까지만 표시
    // 이후는 시작 버튼으로 1분씩 재생
    const startIdx=todayStartIdx+1;
    candles=allCandles.slice(0,startIdx);
    // 전체 데이터 저장 (시작 이후 봉 추가용)
    window._realAllCandles=allCandles;
    window._realNextIdx=startIdx;
    window._todayStartIdx=todayStartIdx;

    curStock={name:js.name||code,code:js.code,date:js.date||date,count:js.count,totalCandles:total};
    elapsed=0;  // 연습 시작 시점부터 0으로 카운팅
    resetStats();refresh();

    const firstT=todayCandles[0].time?todayCandles[0].time.slice(11,16):'';
    const lastT=todayCandles[todayCandles.length-1].time?todayCandles[todayCandles.length-1].time.slice(11,16):'';
    const dateCompact=(curStock.date||date).replace(/-/g,'');
    const missingTxt=(js.missing_minutes&&js.missing_minutes>0)?' (부분누락)':'';
    setBanner('📈 '+curStock.name+' | '+dateCompact+' | '+firstT+'~'+lastT+missingTxt,'breal');
    hideOv();
  }catch(e){
    hideOv();alert('불러오기 실패: '+e.message);
  }
}

  document.getElementById('ovmsg').textContent=m;
  document.getElementById('overlay').className='show';
}
function hideOv(){document.getElementById('overlay').className='';}

// ── 이벤트 ───────────────────────────────────────────────────
document.getElementById('btnAiRequest').onclick=()=>{
  if(!lastTradeRecord){
    alert('완료된 거래(매도로 청산된 거래)가 아직 없습니다.');
    return;
  }
  requestAIAnalysis(lastTradeRecord);
  const tot=wins+losses;
  if(tot>=3)requestPatternAnalysis();
};
document.getElementById('bbToggle').onchange=(e)=>{
  showBB=e.target.checked;
  localStorage.setItem('bb_enabled',showBB?'1':'0');
  PC.data.datasets[2].hidden=!showBB;
  PC.data.datasets[3].hidden=!showBB;
  refresh();
};
document.getElementById('btnLoad').onclick=()=>{
  const v=document.getElementById('stockSel').value;
  if(v!=='' && stockList[+v])loadReal(stockList[+v].code, stockList[+v].date);
};
document.getElementById('btnRandStock').onclick=loadRandomStock;
document.getElementById('btnToggleT').onclick=toggleStart;
document.getElementById('btnToggleTM').onclick=toggleStart;
document.getElementById('btnReset').onclick=()=>{
  stopT();
  resetStats();
  if(curStock)loadReal(curStock.code, curStock.date);else refresh();
};
document.getElementById('btnBuy').onclick=()=>doBuy(1);
document.getElementById('btnBuyHalf').onclick=()=>doBuy(.5);
document.getElementById('btnSell').onclick=()=>doSell(1);
document.getElementById('btnSellHalf').onclick=()=>doSell(.5);
document.getElementById('btnBuyM').onclick=()=>doBuy(1);
document.getElementById('btnBuyHalfM').onclick=()=>doBuy(.5);
document.getElementById('btnSellM').onclick=()=>doSell(1);
document.getElementById('btnSellHalfM').onclick=()=>doSell(.5);

[['s05',.5],['s1',1],['s2',2],['s3',3]].forEach(([id,v])=>{
  document.getElementById(id).onclick=()=>{
    intSec=v;
    localStorage.setItem('speed_sec',String(v));
    ['s05','s1','s2','s3'].forEach(k=>document.getElementById(k).className=k===id?'b':'');
    if(timer){stopT();startT();}  // 재생 중이면 즉시 새 속도로 다시 시작
  };
});
[['c1',10000000],['c5',50000000],['c10',100000000]].forEach(([id,v])=>{
  document.getElementById(id).onclick=()=>{
    capital=v;
    localStorage.setItem('capital_won',String(v));
    ['c1','c5','c10'].forEach(k=>document.getElementById(k).className=k===id?'b':'');
    updateUI();
  };
});

// 저장된 볼린저밴드 설정 복원 (새로고침/재시작해도 유지)
try{
  const savedBB=localStorage.getItem('bb_enabled');
  if(savedBB==='1'){
    showBB=true;
    document.getElementById('bbToggle').checked=true;
    PC.data.datasets[2].hidden=false;
    PC.data.datasets[3].hidden=false;
  }
}catch(e){/* localStorage 사용 불가 환경이면 그냥 기본값(꺼짐) 유지 */}

// 저장된 속도/원금 설정 복원
try{
  const savedSpeed=localStorage.getItem('speed_sec');
  if(savedSpeed){
    intSec=parseFloat(savedSpeed);
    const idMap={'0.5':'s05','1':'s1','2':'s2','3':'s3'};
    const id=idMap[savedSpeed];
    if(id)['s05','s1','s2','s3'].forEach(k=>document.getElementById(k).className=k===id?'b':'');
  }
  const savedCapital=localStorage.getItem('capital_won');
  if(savedCapital){
    capital=parseInt(savedCapital,10);
    const idMap={'10000000':'c1','50000000':'c5','100000000':'c10'};
    const id=idMap[savedCapital];
    if(id)['c1','c5','c10'].forEach(k=>document.getElementById(k).className=k===id?'b':'');
  }
}catch(e){/* localStorage 사용 불가 환경이면 그냥 기본값 유지 */}

// ── 시작 ─────────────────────────────────────────────────────
loadStockList();

})();
